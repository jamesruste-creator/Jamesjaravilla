<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Attendance Simulation Project</title>
<style>
body{font-family:Arial;background:#eef6ff;padding:20px;}
h1,h2{text-align:center;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #888;padding:5px;text-align:center;font-size:14px;}
th{background:#5aa9ff;color:white;}
.day-cell{cursor:pointer;position:relative;width:25px;height:25px;}
.present{background:#4CAF50;color:white;}
.absent{background:#f44336;color:white;}
.empty{background:#ddd;}
.tooltip{display:none;position:absolute;top:-25px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:2px 5px;border-radius:4px;font-size:12px;white-space:nowrap;z-index:1;}
.day-cell:hover .tooltip{display:block;}
button{padding:6px 10px;margin:3px;border:none;border-radius:4px;cursor:pointer;}
#addStudentBtn{background:#ffa500;color:white;}
#resetBtn{background:#ff6347;color:white;}
#exportBtn{background:#4682B4;color:white;}
#printBtn{background:#32CD32;color:white;}
#markAbsentBtn{background:#FF8C00;color:white;}
#loginSection{max-width:300px;margin:0 auto;text-align:center;padding:20px;background:#fff;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
#mainContent{display:none;}
</style>
</head>
<body>

<!-- ===== Login Section ===== -->
<div id="loginSection">
<h2>Class Attendance</h2>
<input type="text" id="username" placeholder="Username"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<p id="loginMsg" style="color:red;"></p>
</div>

<!-- ===== Main Content ===== -->
<div id="mainContent">

<h1>📊 Attendance </h1>

<!-- Add Student -->
<div style="text-align:center">
<input id="studentName" placeholder="Student name">
<input id="studentID" placeholder="Student ID">
<button id="addStudentBtn">Add Student</button>
</div>

<h2 id="sessionTime">Session Not Started</h2>

<!-- Session / Export / Reset / Print / One-Tap Absent Buttons -->
<div style="text-align:center">
<button onclick="startSession()">Start</button>
<button onclick="endSession()">End</button>
<button id="resetBtn" onclick="resetData()">Reset</button>

<button id="markAbsentBtn" onclick="markAbsentToday()">Mark Absent Today</button>
</div>

<!-- Year / Month Selection -->
<h2 style="text-align:center">
Year
<select id="yearSelect"></select>
Month
<select id="monthSelect"></select>
<button onclick="renderCalendar()">Go</button>
</h2>

<!-- Calendar Table -->
<table id="calendarTable"></table>

<!-- Summary -->
<h2 id="summary"></h2>

</div>

<script>
// ===== Login =====
const loginUser="Admin";
const loginPass="admin";
function login(){
  const u=document.getElementById("username").value;
  const p=document.getElementById("password").value;
  if(u===loginUser && p===loginPass){
    document.getElementById("loginSection").style.display="none";
    document.getElementById("mainContent").style.display="block";
  }else{
    document.getElementById("loginMsg").innerText="Invalid credentials!";
  }
}

// ===== Data =====
// Preload sample students
let students=JSON.parse(localStorage.getItem("students")) || [
  {name:"Alice Smith",id:"S001"},
  {name:"Bob Johnson",id:"S002"},
  {name:"Charlie Lee",id:"S003"}
];

// Preload sample attendance
let attendance=JSON.parse(localStorage.getItem("attendance")) || {
  [`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-01`]:{
    "S001":"Present","S001_time":"08:00 AM",
    "S002":"Absent","S002_time":"08:10 AM",
    "S003":"Present","S003_time":"08:05 AM"
  }
};

let sessionStart=null;
let sessionEnd=null;
const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
const yearSelect=document.getElementById("yearSelect");
const monthSelect=document.getElementById("monthSelect");
for(let y=2023;y<=2035;y++){let o=document.createElement("option");o.value=y;o.text=y;yearSelect.appendChild(o);}
months.forEach((m,i)=>{let o=document.createElement("option");o.value=i+1;o.text=m;monthSelect.appendChild(o);});
yearSelect.value=new Date().getFullYear();
monthSelect.value=new Date().getMonth()+1;

// ===== Calendar Render =====
function renderCalendar(){
  const year=yearSelect.value;
  const month=monthSelect.value;
  const lastDay=new Date(year,month,0).getDate();
  const table=document.getElementById("calendarTable");
  table.innerHTML="";
  let header=table.insertRow();
  header.insertCell().innerText="Student / ID";
  for(let d=1;d<=lastDay;d++) header.insertCell().innerText=d;
  students.forEach(s=>{
    let row=table.insertRow();
    row.insertCell().innerText=s.name+" ("+s.id+")";
    for(let d=1;d<=lastDay;d++){
      let cell=row.insertCell();
      cell.classList.add("day-cell");
      const date=`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const status=attendance[date]?.[s.id];
      if(status==="Present") cell.classList.add("present");
      else if(status==="Absent") cell.classList.add("absent");
      else cell.classList.add("empty");
      const time=attendance[date]?.[s.id+"_time"];
      if(time){
        const tooltip=document.createElement("span");
        tooltip.classList.add("tooltip");
        tooltip.innerText="Marked at: "+time;
        cell.appendChild(tooltip);
      }
      cell.onclick=()=>toggleAttendance(s.id,date);
    }
  });
  calculateSummary(year,month,lastDay);
  saveData();
}

// ===== Toggle Attendance =====
function toggleAttendance(id,date){
  if(!attendance[date]) attendance[date]={};
  if(attendance[date][id]==="Present"){attendance[date][id]="Absent";}
  else{attendance[date][id]="Present";attendance[date][id+"_time"]=new Date().toLocaleTimeString();}
  renderCalendar();
}

// ===== Add Student =====
document.getElementById("addStudentBtn").onclick=()=>{
  const name=document.getElementById("studentName").value.trim();
  const id=document.getElementById("studentID").value.trim();
  if(!name||!id){alert("Enter both Name and ID");return;}
  students.push({name,id});
  document.getElementById("studentName").value="";
  document.getElementById("studentID").value="";
  renderCalendar();
};

// ===== Session =====
function startSession(){sessionStart=new Date();document.getElementById("sessionTime").innerText="Session Started: "+sessionStart.toLocaleTimeString();}
function endSession(){sessionEnd=new Date();document.getElementById("sessionTime").innerText="Session Ended: "+sessionEnd.toLocaleTimeString();}

// ===== Summary =====
function calculateSummary(year,month,lastDay){
  let total=0,present=0;
  for(let date in attendance){
    students.forEach(s=>{
      if(attendance[date]?.[s.id]){
        total++;
        if(attendance[date][s.id]==="Present") present++;
      }
    });
  }
  let percent=total?((present/total)*100).toFixed(1):0;
  document.getElementById("summary").innerText="Overall Attendance: "+percent+"%";
}

// ===== Export CSV =====
function exportCSV(){
  let csv="Student,ID,Date,Status,Time\n";
  for(let date in attendance){
    students.forEach(s=>{
      let status=attendance[date]?.[s.id]||"Not Marked";
      let time=attendance[date]?.[s.id+"_time"]||"";
      csv+=`${s.name},${s.id},${date},${status},${time}\n`;
    });
  }
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="attendance.csv";
  a.click();
}

// ===== Printable Report =====
function generatePrintableReport(){
  const year=yearSelect.value;
  const month=monthSelect.value;
  const lastDay=new Date(year,month,0).getDate();
  let html=`<html><head><title>Attendance Report</title>
  <style>
  body{font-family:Arial;} table{border-collapse:collapse;width:100%;} th,td{border:1px solid #888;padding:5px;text-align:center;}
  th{background:#5aa9ff;color:white;} .present{background:#4CAF50;color:white;} .absent{background:#f44336;color:white;} .empty{background:#ddd;}
  </style></head><body>`;
  html+=`<h2>Attendance Report: ${months[month-1]} ${year}</h2>`;
  html+=`<table><tr><th>Student / ID</th>`;
  for(let d=1;d<=lastDay;d++) html+=`<th>${d}</th>`;
  html+=`</tr>`;
  students.forEach(s=>{
    html+=`<tr><td>${s.name} (${s.id})</td>`;
    for(let d=1;d<=lastDay;d++){
      const date=`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const status=attendance[date]?.[s.id];
      let cls="empty";
      if(status==="Present") cls="present";
      else if(status==="Absent") cls="absent";
      html+=`<td class="${cls}"></td>`;
    }
    html+=`</tr>`;
  });
  html+=`</table></body></html>`;
  const w=window.open();
  w.document.write(html);
  w.document.close();
  w.print();
}

// ===== One-Tap Absent =====
function markAbsentToday(){
  const year = yearSelect.value;
  const month = monthSelect.value;
  const today = new Date();
  const day = today.getDate();

  if(today.getMonth()+1 != month || today.getFullYear() != year){
    alert("Selected month/year is different from today!");
    return;
  }

  const dateString = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

  if(!attendance[dateString]) attendance[dateString] = {};

  students.forEach(s => {
    if(!attendance[dateString][s.id]){
      attendance[dateString][s.id] = "Absent";
      attendance[dateString][s.id+"_time"] = new Date().toLocaleTimeString();
    }
  });

  saveData();
  renderCalendar();
  alert("All unmarked students have been marked as Absent for today!");
}

// ===== Reset Data =====
function resetData(){if(confirm("Clear all data?")){students=[];attendance={};localStorage.clear();renderCalendar();}}

// ===== Save =====
function saveData(){localStorage.setItem("students",JSON.stringify(students));localStorage.setItem("attendance",JSON.stringify(attendance));}

// ===== Initialize =====
renderCalendar();
</script>
</body>
</html>
