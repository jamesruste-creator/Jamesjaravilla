<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Ball</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #70c5ce; }
        canvas { display: block; margin: 0 auto; background-color: #fff; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="320" height="480"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game state
    let frames = 0;
    let score = 0;
    let highScore = localStorage.getItem("flappyHighScore") || 0;
    let gameState = 'title'; // title, playing, gameover

    // Bird properties
    const bird = {
        x: 50, y: 150, w: 20, h: 20,
        gravity: 0.6, velocity: 0, jump: -6,
        draw() {
            ctx.fillStyle = '#ffeb3b';
            ctx.fillRect(this.x, this.y, this.w, this.h);
        },
        update() {
            this.velocity += this.gravity;
            this.y += this.velocity;
            if (this.y + this.h > canvas.height) {
                this.y = canvas.height - this.h;
                this.velocity = 0;
                gameOver();
            }
            if (this.y < 0) this.y = 0;
        },
        flap() {
            this.velocity = this.jump;
        },
        reset() {
            this.y = 150;
            this.velocity = 0;
        }
    };

    // Pipes
    const pipes = {
        position: [],
        gap: 120,
        width: 50,
        speed: 1.5,
        draw() {
            ctx.fillStyle = '#4caf50';
            this.position.forEach(p => {
                ctx.fillRect(p.x, 0, this.width, p.y); // Top pipe
                ctx.fillRect(p.x, p.y + this.gap, this.width, canvas.height - (p.y + this.gap)); // Bottom
            });
        },
        update() {
            if (frames % 100 === 0) {
                this.position.push({
                    x: canvas.width,
                    y: Math.floor(Math.random() * (canvas.height - 200)) + 50
                });
            }
            this.position.forEach(p => {
                p.x -= this.speed;

                // Collision detection
                if (bird.x + bird.w > p.x && bird.x < p.x + this.width &&
                    (bird.y < p.y || bird.y + bird.h > p.y + this.gap)) {
                    gameOver();
                }

                if (p.x + this.width < 0) {
                    this.position.shift();
                    score++;
                    highScore = Math.max(score, highScore);
                    localStorage.setItem("flappyHighScore", highScore);
                }
            });
        },
        reset() {
            this.position = [];
        }
    };

    function gameOver() {
        gameState = 'gameover';
    }

    function resetGame() {
        bird.reset();
        pipes.reset();
        score = 0;
        frames = 0;
        gameState = 'playing';
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Background
        ctx.fillStyle = '#70c5ce';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        pipes.draw();
        bird.draw();

        // Score
        ctx.fillStyle = "#fff";
        ctx.font = "25px Arial";
        if (gameState === 'playing') {
            ctx.fillText(score, canvas.width / 2, 50);
        } else if (gameState === 'title') {
            ctx.fillText("Tap to Start", 40, canvas.height / 2);
        } else if (gameState === 'gameover') {
            ctx.fillText("Game Over", 100, canvas.height / 2 - 20);
            ctx.fillText("Score: " + score, 110, canvas.height / 2 + 10);
            ctx.fillText("Best: " + highScore, 115, canvas.height / 2 + 40);
        }
    }

    function loop() {
        if (gameState === 'playing') {
            bird.update();
            pipes.update();
            frames++;
        }
        draw();
        requestAnimationFrame(loop);
    }

    // Input Handling
    window.addEventListener('keydown', e => { if (e.code === 'Space') handleInput(); });
    window.addEventListener('touchstart', handleInput);
    window.addEventListener('mousedown', handleInput);

    function handleInput() {
        if (gameState === 'title') {
            gameState = 'playing';
        } else if (gameState === 'playing') {
            bird.flap();
        } else if (gameState === 'gameover') {
            resetGame();
        }
    }

    loop();
</script>
</body>
</html>
